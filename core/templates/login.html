<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Login — Qualify</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Noto+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --saffron: #E8622A;
    --turmeric: #F2A93B;
    --cream: #FAF6F0;
    --cream-dark: #F0E9DF;
    --indigo: #1A1A2E;
    --text: #1C1C1C;
    --text-muted: #7A7A7A;
    --white: #FFFFFF;
    --error: #D93025;
    --radius: 18px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'Noto Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
  }

  /* ─── PATTERN STRIP ─── */
  .pattern-strip {
    height: 4px;
    background: repeating-linear-gradient(
      90deg,
      var(--saffron) 0px, var(--saffron) 8px,
      var(--turmeric) 8px, var(--turmeric) 16px,
      white 16px, white 20px,
      var(--indigo) 20px, var(--indigo) 28px,
      white 28px, white 32px
    );
    opacity: 0.65;
  }

  /* ─── TOP BAR ─── */
  .top-bar {
    display: flex;
    align-items: center;
    padding: 16px 20px;
    gap: 12px;
  }

  .back-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--white);
    border: 1.5px solid rgba(0,0,0,0.08);
    display: flex; align-items: center; justify-content: center;
    text-decoration: none; color: var(--text);
    font-size: 17px; transition: all 0.15s;
    flex-shrink: 0;
  }
  .back-btn:active { background: var(--cream-dark); transform: scale(0.94); }

  .top-logo {
    font-family: 'Sora', sans-serif;
    font-size: 18px; font-weight: 800;
    color: var(--saffron); letter-spacing: -0.4px;
  }

  /* ─── HERO AREA ─── */
  .hero-area {
    padding: 10px 24px 28px;
    animation: fadeUp 0.45s ease both;
  }

  .hero-area h1 {
    font-family: 'Sora', sans-serif;
    font-size: 30px; font-weight: 800;
    letter-spacing: -1px; color: var(--indigo);
    line-height: 1.15;
  }

  .hero-area h1 span { color: var(--saffron); }

  .hero-area p {
    margin-top: 8px;
    font-size: 14.5px; color: var(--text-muted); line-height: 1.6;
  }

  /* ─── CARD ─── */
  .form-card {
    margin: 0 16px;
    background: var(--white);
    border-radius: var(--radius);
    padding: 26px 22px;
    box-shadow: 0 2px 20px rgba(0,0,0,0.06);
    border: 1px solid rgba(0,0,0,0.04);
    animation: fadeUp 0.45s 0.08s ease both;
  }

  /* ─── FORM FIELDS ─── */
  .field {
    margin-bottom: 16px;
  }

  .field label {
    display: block;
    font-family: 'Sora', sans-serif;
    font-size: 12px; font-weight: 700;
    color: var(--text-muted); letter-spacing: 0.8px;
    text-transform: uppercase; margin-bottom: 7px;
  }

  .input-wrap {
    position: relative;
  }

  .input-icon {
    position: absolute; left: 14px; top: 50%;
    transform: translateY(-50%);
    font-size: 16px; opacity: 0.45;
    pointer-events: none;
  }

  .field input {
    width: 100%; padding: 13px 14px 13px 42px;
    border: 1.5px solid rgba(0,0,0,0.1);
    border-radius: 12px;
    font-family: 'Noto Sans', sans-serif;
    font-size: 15px; color: var(--text);
    background: var(--cream);
    outline: none; transition: border-color 0.18s, background 0.18s;
    -webkit-appearance: none;
  }

  .field input:focus {
    border-color: var(--saffron);
    background: var(--white);
    box-shadow: 0 0 0 3px rgba(232,98,42,0.08);
  }

  .field input::placeholder { color: #BABABA; }

  /* password toggle */
  .pw-toggle {
    position: absolute; right: 14px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    font-size: 16px; cursor: pointer; opacity: 0.4;
    padding: 4px; transition: opacity 0.15s;
  }
  .pw-toggle:active { opacity: 0.8; }

  /* forgot */
  .forgot-row {
    display: flex; justify-content: flex-end;
    margin-top: -8px; margin-bottom: 16px;
  }
  .forgot-link {
    font-family: 'Sora', sans-serif; font-size: 12.5px;
    font-weight: 600; color: var(--saffron);
    text-decoration: none;
  }

  /* ─── SUBMIT BTN ─── */
  .btn-submit {
    width: 100%;
    font-family: 'Sora', sans-serif;
    font-size: 15px; font-weight: 700;
    color: white; background: var(--saffron);
    border: none; padding: 15px;
    border-radius: 14px; cursor: pointer;
    letter-spacing: -0.2px;
    box-shadow: 0 6px 20px rgba(232,98,42,0.28);
    transition: all 0.18s; margin-top: 4px;
  }
  .btn-submit:active { transform: scale(0.975); opacity: 0.88; }

  /* ─── DIVIDER ─── */
  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 20px 0;
  }
  .divider-line { flex: 1; height: 1px; background: rgba(0,0,0,0.08); }
  .divider-text {
    font-size: 12px; color: var(--text-muted);
    font-weight: 500; white-space: nowrap;
  }

  /* ─── PHONE LOGIN ─── */
  .btn-phone {
    width: 100%; display: flex; align-items: center;
    justify-content: center; gap: 10px;
    font-family: 'Sora', sans-serif; font-size: 14px;
    font-weight: 600; color: var(--text);
    background: var(--cream); border: 1.5px solid rgba(0,0,0,0.1);
    padding: 13px; border-radius: 14px;
    cursor: pointer; transition: all 0.18s;
  }
  .btn-phone:active { background: var(--cream-dark); transform: scale(0.975); }

  /* ─── SIGNUP LINK ─── */
  .signup-row {
    text-align: center; margin-top: 24px;
    font-size: 14px; color: var(--text-muted);
    animation: fadeUp 0.45s 0.16s ease both;
  }
  .signup-row a {
    font-family: 'Sora', sans-serif;
    font-weight: 700; color: var(--saffron);
    text-decoration: none;
  }

  /* ─── DECORATIVE BG ─── */
  .bg-deco {
    position: fixed; bottom: -60px; right: -60px;
    width: 220px; height: 220px;
    background: radial-gradient(circle, rgba(232,98,42,0.06) 0%, transparent 65%);
    border-radius: 50%; pointer-events: none; z-index: 0;
  }

  .spacer { flex: 1; }

  /* ─── FOOTER ─── */
  .page-footer {
    padding: 20px; text-align: center;
    font-size: 11.5px; color: rgba(0,0,0,0.22);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="pattern-strip"></div>

<div class="top-bar">
  <a href="/" class="back-btn">←</a>
  <div class="top-logo">Qualify</div>
</div>

<div class="hero-area">
  <h1>Welcome<br><span>back.</span></h1>
  <p>Login to manage your store's quality, suppliers, and khata.</p>
</div>

<div class="form-card">
  <form method="post" action="/auth/login/">
    {% csrf_token %}

    <div class="field">
      <label>Username</label>
      <div class="input-wrap">
        <span class="input-icon">👤</span>
        <input
          name="username"
          type="text"
          placeholder="Enter your username"
          autocomplete="username"
          autocapitalize="none"
        >
      </div>
    </div>

    <div class="field">
      <label>Password</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input
          name="password"
          type="password"
          placeholder="Enter your password"
          autocomplete="current-password"
          id="pw-input"
        >
        <button type="button" class="pw-toggle" onclick="togglePw()" id="pw-btn">👁</button>
      </div>
    </div>

    <div class="forgot-row">
      <a href="/auth/forgot/" class="forgot-link">Forgot password?</a>
    </div>

    <button type="submit" class="btn-submit">Login to Qualify →</button>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">ya phir</div>
      <div class="divider-line"></div>
    </div>

    <button type="button" class="btn-phone">
      📱 Phone Number se Login
    </button>

  </form>
</div>

<div class="signup-row">
  Naya account chahiye? <a href="/auth/signup/">Sign up karein</a>
</div>

<div class="spacer"></div>
<div class="page-footer">© 2025 Qualify · Smart Quality for Kirana Stores</div>
<div class="bg-deco"></div>

<script>
  function togglePw() {
    const inp = document.getElementById('pw-input');
    const btn = document.getElementById('pw-btn');
    if (inp.type === 'password') {
      inp.type = 'text';
      btn.textContent = '🙈';
    } else {
      inp.type = 'password';
      btn.textContent = '👁';
    }
  }
</script>
</body>
</html>
