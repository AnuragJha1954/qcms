<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Settle Payment — Qualify</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Noto+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--saffron:#E8622A;--turmeric:#F2A93B;--cream:#FAF6F0;--cream-dark:#F0E9DF;--indigo:#1A1A2E;--text:#1C1C1C;--text-muted:#7A7A7A;--white:#FFFFFF;--green:#2A9D5C;--radius:18px}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:'Noto Sans',sans-serif;background:var(--cream);color:var(--text);max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:32px}

  .pattern-strip{height:4px;background:repeating-linear-gradient(90deg,var(--saffron) 0,var(--saffron) 8px,var(--turmeric) 8px,var(--turmeric) 16px,#fff 16px,#fff 20px,var(--indigo) 20px,var(--indigo) 28px,#fff 28px,#fff 32px);opacity:.65}

  .header{padding:14px 20px;background:var(--white);display:flex;align-items:center;gap:12px;box-shadow:0 1px 0 rgba(0,0,0,.06)}
  .back-btn{width:34px;height:34px;border-radius:50%;background:var(--cream);border:1.5px solid rgba(0,0,0,.08);display:flex;align-items:center;justify-content:center;text-decoration:none;color:var(--text);font-size:15px;flex-shrink:0;transition:all .15s}
  .back-btn:active{background:var(--cream-dark);transform:scale(.93)}
  .header-info{flex:1}
  .page-title{font-family:'Sora',sans-serif;font-size:16px;font-weight:800;color:var(--text);letter-spacing:-.4px}
  .page-sub{font-size:11.5px;color:var(--text-muted);margin-top:1px}

  /* balance banner */
  .balance-banner{margin:16px 16px 0;background:var(--indigo);border-radius:var(--radius);padding:20px 22px;position:relative;overflow:hidden;animation:fadeUp .45s ease both}
  .bb-glow{position:absolute;right:-40px;top:-40px;width:140px;height:140px;background:radial-gradient(circle,rgba(42,157,92,.25) 0%,transparent 65%);border-radius:50%;pointer-events:none}
  .bb-label{font-family:'Sora',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:5px;position:relative;z-index:1}
  .bb-amount{font-family:'Sora',sans-serif;font-size:32px;font-weight:800;color:#56D98B;letter-spacing:-1px;position:relative;z-index:1}
  .bb-party{font-size:13px;color:rgba(255,255,255,.5);margin-top:4px;position:relative;z-index:1}

  .form-card{margin:16px 16px 0;background:var(--white);border-radius:var(--radius);padding:22px;box-shadow:0 2px 16px rgba(0,0,0,.06);border:1px solid rgba(0,0,0,.04);animation:fadeUp .4s .08s ease both}

  .field{margin-bottom:16px}
  .field label{display:block;font-family:'Sora',sans-serif;font-size:11.5px;font-weight:700;color:var(--text-muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:7px}
  .input-wrap{position:relative}

  /* big amount */
  .rupee-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-family:'Sora',sans-serif;font-size:22px;font-weight:800;color:var(--text-muted);opacity:.45;pointer-events:none}
  .amount-input{width:100%;padding:14px 14px 14px 50px;border:1.5px solid rgba(0,0,0,.1);border-radius:12px;font-family:'Sora',sans-serif;font-size:28px;font-weight:800;letter-spacing:-1px;color:var(--text);background:var(--cream);outline:none;-webkit-appearance:none;transition:border-color .18s,background .18s}
  .amount-input:focus{border-color:var(--green);background:var(--white);box-shadow:0 0 0 3px rgba(42,157,92,.1)}
  .amount-input::placeholder{color:#C0BAB2}

  /* quick amounts */
  .quick-amounts{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  .qa{font-family:'Sora',sans-serif;font-size:13px;font-weight:700;padding:7px 14px;background:var(--cream);border:1.5px solid rgba(0,0,0,.09);border-radius:50px;color:var(--text-muted);cursor:pointer;transition:all .15s}
  .qa:active{background:var(--green);border-color:var(--green);color:white}

  .btn-submit{width:100%;font-family:'Sora',sans-serif;font-size:15px;font-weight:700;color:white;background:var(--green);border:none;padding:15px;border-radius:14px;cursor:pointer;letter-spacing:-.2px;box-shadow:0 6px 20px rgba(42,157,92,.28);transition:all .18s;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:7px}
  .btn-submit:active{transform:scale(.975);opacity:.88}

  .settle-note{margin-top:12px;padding:12px 14px;background:rgba(42,157,92,.07);border-radius:10px;font-size:12.5px;color:var(--green);font-weight:500;text-align:center;line-height:1.5}

  @keyframes fadeUp{from{opacity:0;transform:translateY(13px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="pattern-strip"></div>

<div class="header">
  <a href="/khata/{{party.id}}/" class="back-btn">←</a>
  <div class="header-info">
    <div class="page-title">Settle Payment</div>
    <div class="page-sub">{{party.name}}</div>
  </div>
</div>

<!-- Balance banner -->
<div class="balance-banner">
  <div class="bb-glow"></div>
  <div class="bb-label">Current Balance</div>
  <div class="bb-amount">₹{{balance}}</div>
  <div class="bb-party">{{party.name}} ka balance</div>
</div>

<div class="form-card">
  <form method="POST" action="/khata/{{party.id}}/settle/">
    {% csrf_token %}

    <div class="field">
      <label>Settlement Amount (₹)</label>
      <div class="input-wrap">
        <span class="rupee-icon">₹</span>
        <input name="amount" type="number" placeholder="0" class="amount-input" id="settle-amt" required inputmode="numeric">
      </div>
      <!-- Quick amount buttons -->
      <div class="quick-amounts">
        <div class="qa" onclick="setAmt(100)">₹100</div>
        <div class="qa" onclick="setAmt(500)">₹500</div>
        <div class="qa" onclick="setAmt(1000)">₹1,000</div>
        <div class="qa" onclick="setAmt('{{balance}}')">Full ₹{{balance}}</div>
      </div>
    </div>

    <button type="submit" class="btn-submit">💰 Payment Confirm Karo</button>

    <div class="settle-note">
      ✅ Payment settle hone ke baad balance update ho jayega aur PDF mein record rahega.
    </div>

  </form>
</div>

<script>
  function setAmt(val) {
    document.getElementById('settle-amt').value = val;
  }
</script>

</body>
</html>
