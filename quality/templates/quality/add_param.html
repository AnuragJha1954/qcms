<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Parameter Add Karo — Qualify</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Noto+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--saffron:#E8622A;--turmeric:#F2A93B;--cream:#FAF6F0;--cream-dark:#F0E9DF;--indigo:#1A1A2E;--text:#1C1C1C;--text-muted:#7A7A7A;--white:#FFFFFF;--green:#2A9D5C;--radius:18px}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:'Noto Sans',sans-serif;background:var(--cream);color:var(--text);max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:32px}

  .pattern-strip{height:4px;background:repeating-linear-gradient(90deg,var(--saffron) 0,var(--saffron) 8px,var(--turmeric) 8px,var(--turmeric) 16px,#fff 16px,#fff 20px,var(--indigo) 20px,var(--indigo) 28px,#fff 28px,#fff 32px);opacity:.65}

  .header{padding:14px 20px;background:var(--white);display:flex;align-items:center;gap:12px;box-shadow:0 1px 0 rgba(0,0,0,.06)}
  .back-btn{width:34px;height:34px;border-radius:50%;background:var(--cream);border:1.5px solid rgba(0,0,0,.08);display:flex;align-items:center;justify-content:center;text-decoration:none;color:var(--text);font-size:15px;flex-shrink:0;transition:all .15s}
  .back-btn:active{background:var(--cream-dark);transform:scale(.93)}
  .header-info{flex:1}
  .page-title{font-family:'Sora',sans-serif;font-size:16px;font-weight:800;color:var(--text);letter-spacing:-.4px}
  .page-sub{font-size:11.5px;color:var(--text-muted);margin-top:1px}

  .hero-area{padding:20px 24px 16px;animation:fadeUp .45s ease both}
  .hero-area h1{font-family:'Sora',sans-serif;font-size:26px;font-weight:800;letter-spacing:-.8px;color:var(--indigo);line-height:1.2}
  .hero-area h1 span{color:var(--saffron)}
  .hero-area p{margin-top:6px;font-size:14px;color:var(--text-muted);line-height:1.55}

  .form-card{margin:0 16px;background:var(--white);border-radius:var(--radius);padding:22px;box-shadow:0 2px 16px rgba(0,0,0,.06);border:1px solid rgba(0,0,0,.04);animation:fadeUp .4s .08s ease both}

  .form-section-label{font-family:'Sora',sans-serif;font-size:10.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);margin:18px 0 12px;display:flex;align-items:center;gap:8px}
  .form-section-label::before,.form-section-label::after{content:'';flex:1;height:1px;background:rgba(0,0,0,.07)}
  .form-section-label:first-child{margin-top:0}

  .field{margin-bottom:14px}
  .field label{display:block;font-family:'Sora',sans-serif;font-size:11.5px;font-weight:700;color:var(--text-muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:7px}
  .input-wrap{position:relative}
  .input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:15px;opacity:.4;pointer-events:none}
  .field input{width:100%;padding:13px 14px 13px 42px;border:1.5px solid rgba(0,0,0,.1);border-radius:12px;font-family:'Noto Sans',sans-serif;font-size:15px;color:var(--text);background:var(--cream);outline:none;-webkit-appearance:none;transition:border-color .18s,background .18s}
  .field input:focus{border-color:var(--saffron);background:var(--white);box-shadow:0 0 0 3px rgba(232,98,42,.08)}
  .field input::placeholder{color:#C0BAB2}

  /* min-max row */
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}

  /* example pill */
  .examples{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .ex-pill{font-family:'Sora',sans-serif;font-size:12px;font-weight:600;padding:5px 12px;background:var(--cream-dark);border:1.5px solid rgba(0,0,0,.08);border-radius:50px;color:var(--text-muted);cursor:pointer;transition:all .15s}
  .ex-pill:active{background:rgba(232,98,42,.1);border-color:var(--saffron);color:var(--saffron)}

  .btn-submit{width:100%;font-family:'Sora',sans-serif;font-size:15px;font-weight:700;color:white;background:var(--saffron);border:none;padding:15px;border-radius:14px;cursor:pointer;letter-spacing:-.2px;box-shadow:0 6px 20px rgba(232,98,42,.28);transition:all .18s;margin-top:20px}
  .btn-submit:active{transform:scale(.975);opacity:.88}

  @keyframes fadeUp{from{opacity:0;transform:translateY(13px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="pattern-strip"></div>

<div class="header">
  <a href="/quality/{{product.id}}/" class="back-btn">←</a>
  <div class="header-info">
    <div class="page-title">Parameter Add Karo</div>
    <div class="page-sub">{{product.name}}</div>
  </div>
</div>

<div class="hero-area">
  <h1>Quality ka<br><span>parameter</span> set karo</h1>
  <p>Is product ko judge karne ke liye criteria define karo.</p>
</div>

<div class="form-card">
  <form method="POST" action="/quality/{{product.id}}/add-param/">
    {% csrf_token %}

    <div class="form-section-label">Parameter Info</div>

    <div class="field">
      <label>Parameter Name</label>
      <div class="input-wrap">
        <span class="input-icon">📊</span>
        <input name="name" type="text" placeholder="e.g. Size, Color, Freshness" id="param-name" required autocapitalize="words">
      </div>
      <div class="examples">
        <div class="ex-pill" onclick="fillName('Size')">Size</div>
        <div class="ex-pill" onclick="fillName('Color')">Color</div>
        <div class="ex-pill" onclick="fillName('Freshness')">Freshness</div>
        <div class="ex-pill" onclick="fillName('Weight')">Weight</div>
        <div class="ex-pill" onclick="fillName('Texture')">Texture</div>
      </div>
    </div>

    <div class="form-section-label">Value Range</div>

    <div class="two-col">
      <div class="field">
        <label>Minimum</label>
        <div class="input-wrap">
          <span class="input-icon">⬇️</span>
          <input name="min" type="number" placeholder="e.g. 1" inputmode="decimal">
        </div>
      </div>
      <div class="field">
        <label>Maximum</label>
        <div class="input-wrap">
          <span class="input-icon">⬆️</span>
          <input name="max" type="number" placeholder="e.g. 10" inputmode="decimal">
        </div>
      </div>
    </div>

    <div class="field">
      <label>Ideal Value</label>
      <div class="input-wrap">
        <span class="input-icon">🎯</span>
        <input name="ideal" type="number" placeholder="Ideal target value" inputmode="decimal">
      </div>
    </div>

    <button type="submit" class="btn-submit">Parameter Save Karo →</button>
  </form>
</div>

<script>
  function fillName(val) {
    document.getElementById('param-name').value = val;
  }
</script>

</body>
</html>
