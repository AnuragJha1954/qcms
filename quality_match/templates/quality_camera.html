<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Quality Scan — Qualify</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>

  :root {
    --saffron: #E8622A;
    --turmeric: #F2A93B;
    --indigo: #1A1A2E;
    --green: #2A9D5C;
    --red: #D93025;
    --white: #FFFFFF;
  }

  *, *::before, *::after {
    margin: 0; padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'Sora', sans-serif;
    max-width: 430px;
    margin: 0 auto;
  }

  /* ─── LIVE CAMERA ─── */
  #video {
    position: fixed;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 0;
  }

  /* ─── GRADIENT VIGNETTE ─── */
  .vignette {
    position: fixed; inset: 0; z-index: 1;
    background:
      linear-gradient(to bottom,
        rgba(0,0,0,0.6) 0%,
        transparent 28%,
        transparent 58%,
        rgba(0,0,0,0.75) 100%
      );
    pointer-events: none;
  }

  /* ─── TOP BAR ─── */
  .top-bar {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 10;
    padding: 50px 20px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 430px;
    margin: 0 auto;
  }

  .back-btn {
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    text-decoration: none; color: var(--white);
    font-size: 16px; transition: all .15s;
    flex-shrink: 0;
  }
  .back-btn:active { background: rgba(255,255,255,0.15); transform: scale(.93); }

  .top-center {
    display: flex; flex-direction: column; align-items: center;
  }

  .top-logo {
    font-size: 16px; font-weight: 800;
    color: var(--white); letter-spacing: -.3px;
    opacity: .9;
  }

  .top-subtitle {
    font-size: 11px; font-weight: 600;
    color: rgba(255,255,255,0.5);
    letter-spacing: .5px; text-transform: uppercase;
    margin-top: 2px;
  }

  .product-selector {
    display: flex; align-items: center; gap: 6px;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 50px;
    padding: 7px 14px;
    font-size: 13px; font-weight: 700;
    color: var(--white); cursor: pointer;
    transition: all .15s;
  }
  .product-selector:active { background: rgba(255,255,255,0.15); }
  .product-selector span { font-size: 11px; opacity: .6; }

  /* ─── SCAN FRAME ─── */
  .scan-frame {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -60%);
    z-index: 2;
    width: min(72vw, 300px);
    aspect-ratio: 1;
    pointer-events: none;
  }

  .scan-frame::before,
  .scan-frame::after,
  .corner-br,
  .corner-bl {
    content: '';
    position: absolute;
    width: 28px; height: 28px;
    border-color: rgba(255,255,255,0.85);
    border-style: solid;
  }

  /* top-left */
  .scan-frame::before {
    top: 0; left: 0;
    border-width: 3px 0 0 3px;
    border-radius: 6px 0 0 0;
  }
  /* top-right */
  .scan-frame::after {
    top: 0; right: 0;
    border-width: 3px 3px 0 0;
    border-radius: 0 6px 0 0;
  }
  .corner-br {
    bottom: 0; right: 0;
    border-width: 0 3px 3px 0;
    border-radius: 0 0 6px 0;
  }
  .corner-bl {
    bottom: 0; left: 0;
    border-width: 0 0 3px 3px;
    border-radius: 0 0 0 6px;
  }

  /* Animated scan line */
  .scan-line {
    position: absolute;
    left: 4px; right: 4px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--saffron), transparent);
    animation: scanMove 2.2s ease-in-out infinite;
    box-shadow: 0 0 8px rgba(232,98,42,0.8);
  }

  @keyframes scanMove {
    0%   { top: 8px; opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { top: calc(100% - 8px); opacity: 0; }
  }

  /* Focus dot hint text */
  .frame-hint {
    position: fixed;
    top: calc(50% - min(36vw, 150px) - 80px);
    left: 50%;
    transform: translateX(-50%);
    z-index: 3;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 50px;
    padding: 6px 16px;
    font-size: 12.5px; font-weight: 600;
    color: rgba(255,255,255,0.75);
    white-space: nowrap;
    letter-spacing: .2px;
    pointer-events: none;
    animation: hintPulse 3s ease infinite;
  }

  @keyframes hintPulse {
    0%,100% { opacity: .7; }
    50%      { opacity: 1; }
  }

  /* ─── BOTTOM CONTROLS ─── */
  .bottom-controls {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 10;
    padding: 0 28px 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 430px;
    margin: 0 auto;
  }

  /* side icon buttons */
  .side-btn {
    width: 48px; height: 48px; border-radius: 50%;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    color: var(--white); font-size: 18px;
    cursor: pointer; transition: all .15s;
  }
  .side-btn:active { transform: scale(.92); background: rgba(255,255,255,0.15); }

  /* main shutter */
  .shutter-wrap {
    display: flex; flex-direction: column;
    align-items: center; gap: 8px;
  }

  .shutter-btn {
    width: 78px; height: 78px; border-radius: 50%;
    background: transparent;
    border: 3px solid rgba(255,255,255,0.85);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all .18s;
    position: relative;
  }
  .shutter-btn:active { transform: scale(.93); border-color: var(--saffron); }
  .shutter-btn:active .shutter-inner { background: var(--saffron); transform: scale(.85); }

  .shutter-inner {
    width: 60px; height: 60px; border-radius: 50%;
    background: var(--white);
    transition: all .18s;
    display: flex; align-items: center; justify-content: center;
  }

  .shutter-icon { font-size: 24px; line-height: 1; }

  .shutter-label {
    font-size: 11px; font-weight: 700;
    color: rgba(255,255,255,0.65);
    letter-spacing: .5px; text-transform: uppercase;
  }

  /* ─── LOADER OVERLAY ─── */
  .loader {
    position: fixed; inset: 0; z-index: 20;
    background: rgba(0,0,0,0.82);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: none;
    flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0;
    max-width: 430px; margin: 0 auto;
  }
  .loader.visible { display: flex; }

  .loader-ring {
    width: 80px; height: 80px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: var(--saffron);
    border-right-color: var(--turmeric);
    animation: spin 1s linear infinite;
    margin-bottom: 22px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loader-icon {
    font-size: 32px; margin-bottom: 14px;
    animation: iconPop .6s ease;
  }

  @keyframes iconPop {
    0%   { transform: scale(0.5); opacity: 0; }
    70%  { transform: scale(1.15); }
    100% { transform: scale(1); opacity: 1; }
  }

  .loader-title {
    font-size: 18px; font-weight: 800;
    color: var(--white); letter-spacing: -.4px;
    margin-bottom: 6px;
  }

  .loader-sub {
    font-size: 13px; font-weight: 500;
    color: rgba(255,255,255,0.45);
    letter-spacing: .2px;
  }

  /* Progress dots */
  .loader-dots {
    display: flex; gap: 7px; margin-top: 20px;
  }

  .ldot {
    width: 7px; height: 7px; border-radius: 50%;
    background: rgba(255,255,255,0.2);
    animation: dotPulse 1.2s ease infinite;
  }
  .ldot:nth-child(2) { animation-delay: .2s; }
  .ldot:nth-child(3) { animation-delay: .4s; }

  @keyframes dotPulse {
    0%,100% { background: rgba(255,255,255,0.2); transform: scale(1); }
    50%      { background: var(--saffron); transform: scale(1.3); }
  }

  /* ─── RESULT SHEET ─── */
  .result-sheet {
    position: fixed;
    bottom: -100%;
    left: 0; right: 0;
    z-index: 25;
    background: var(--white);
    border-radius: 26px 26px 0 0;
    padding: 10px 0 44px;
    transition: bottom .38s cubic-bezier(0.34, 1.2, 0.64, 1);
    max-width: 430px; margin: 0 auto;
    box-shadow: 0 -12px 48px rgba(0,0,0,0.3);
  }
  .result-sheet.open { bottom: 0; }

  /* Drag pill */
  .sheet-pill {
    width: 40px; height: 4px; border-radius: 2px;
    background: rgba(0,0,0,0.1);
    margin: 0 auto 20px;
  }

  /* Result header band */
  .result-header {
    margin: 0 20px;
    border-radius: 18px;
    padding: 20px 20px;
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 18px;
  }
  .rh-good   { background: rgba(42,157,92,0.1); }
  .rh-accept { background: rgba(242,169,59,0.12); }
  .rh-reject { background: rgba(217,48,37,0.08); }

  .result-emoji {
    font-size: 40px; line-height: 1; flex-shrink: 0;
  }

  .result-title-wrap {}

  .result-verdict {
    font-size: 22px; font-weight: 800;
    letter-spacing: -.6px; line-height: 1;
  }
  .color-good   { color: var(--green); }
  .color-accept { color: #C47F00; }
  .color-reject { color: var(--red); }

  .result-sub {
    font-size: 13px; font-weight: 500;
    color: #7A7A7A; margin-top: 4px; line-height: 1.45;
  }

  /* Score bar */
  .score-section {
    padding: 0 20px;
    margin-bottom: 16px;
  }

  .score-row {
    display: flex; align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .score-label {
    font-size: 12px; font-weight: 700;
    color: #7A7A7A; letter-spacing: .5px;
    text-transform: uppercase;
  }

  .score-value {
    font-size: 16px; font-weight: 800;
    letter-spacing: -.4px;
  }

  .score-track {
    width: 100%; height: 8px;
    background: rgba(0,0,0,0.07);
    border-radius: 4px; overflow: hidden;
  }

  .score-fill {
    height: 100%; border-radius: 4px;
    transition: width .7s cubic-bezier(0.34, 1.1, 0.64, 1);
    width: 0%;
  }
  .fill-good   { background: linear-gradient(90deg, var(--green), #4CD48A); }
  .fill-accept { background: linear-gradient(90deg, #C47F00, var(--turmeric)); }
  .fill-reject { background: linear-gradient(90deg, var(--red), #E84444); }

  /* Reason card */
  .reason-card {
    margin: 0 20px 18px;
    background: rgba(0,0,0,0.03);
    border: 1px solid rgba(0,0,0,0.06);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex; gap: 10px; align-items: flex-start;
  }

  .reason-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }

  .reason-text {
    font-size: 13.5px;
    color: #3A3A3A;
    line-height: 1.6;
    font-weight: 500;
  }

  /* Action buttons */
  .result-actions {
    padding: 0 20px;
    display: flex; gap: 10px;
  }

  .action-btn {
    flex: 1; display: flex;
    align-items: center; justify-content: center;
    gap: 7px; padding: 14px;
    border-radius: 14px;
    font-family: 'Sora', sans-serif;
    font-size: 14px; font-weight: 700;
    letter-spacing: -.2px;
    cursor: pointer; border: none;
    text-decoration: none;
    transition: all .15s;
  }
  .action-btn:active { transform: scale(.975); opacity: .88; }

  .btn-accept {
    background: var(--green); color: var(--white);
    box-shadow: 0 4px 16px rgba(42,157,92,0.25);
  }

  .btn-reject {
    background: rgba(217,48,37,0.09);
    color: var(--red);
    border: 1.5px solid rgba(217,48,37,0.2);
  }

  .btn-rescan {
    background: rgba(0,0,0,0.06);
    color: #3A3A3A;
    border: 1.5px solid rgba(0,0,0,0.09);
  }

  /* ─── FLASH EFFECT ─── */
  .flash {
    position: fixed; inset: 0; z-index: 15;
    background: white; opacity: 0;
    pointer-events: none;
    transition: opacity .08s;
    max-width: 430px; margin: 0 auto;
  }
  .flash.active { opacity: 1; }

  /* ─── FROZEN FRAME ─── */
  #frozen {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 1;
    display: none;
  }



</style>
</head>
<body>

<!-- LIVE VIDEO -->
<video id="video" autoplay playsinline muted></video>

<!-- FROZEN CAPTURE FRAME -->
<img id="frozen" alt="">

<!-- VIGNETTE -->
<div class="vignette"></div>

<!-- TOP BAR -->
<div class="top-bar">
  <a href="/dashboard/" class="back-btn">←</a>

  <div class="top-center">
    <div class="top-logo">Qualify</div>
    <div class="top-subtitle">Quality Scan</div>
  </div>

  <div class="product-selector" id="productSelector">
    🥦 Aloo <span>▾</span>
  </div>
</div>

<!-- SCAN FRAME CORNERS -->
<div class="scan-frame">
  <div class="corner-br"></div>
  <div class="corner-bl"></div>
  <div class="scan-line"></div>
</div>

<!-- HINT TEXT -->
<div class="frame-hint" id="frameHint">Product ko frame ke andar lo</div>

<!-- BOTTOM CONTROLS -->
<div class="bottom-controls">

  <div class="side-btn" id="torchBtn" onclick="toggleTorch()" title="Torch">
    🔦
  </div>

  <div class="shutter-wrap">
    <div class="shutter-btn" id="shutterBtn" onclick="capture()">
      <div class="shutter-inner">
        <span class="shutter-icon">📷</span>
      </div>
    </div>
    <div class="shutter-label">Scan Karo</div>
  </div>

  <div class="side-btn" onclick="flipCamera()" title="Flip camera">
    🔄
  </div>

</div>

<!-- FLASH -->
<div class="flash" id="flash"></div>

<!-- LOADER -->
<div class="loader" id="loader">
  <div class="loader-ring"></div>
  <div class="loader-icon">🔍</div>
  <div class="loader-title">Quality Check Ho Raha Hai</div>
  <div class="loader-sub">AI analyze kar raha hai…</div>
  <div class="loader-dots">
    <div class="ldot"></div>
    <div class="ldot"></div>
    <div class="ldot"></div>
  </div>
</div>

<!-- RESULT BOTTOM SHEET -->
<div class="result-sheet" id="resultSheet">
  <div class="sheet-pill"></div>
  <div class="result-header rh-good" id="resultHeader">
    <div class="result-emoji" id="resultEmoji">✅</div>
    <div class="result-title-wrap">
      <div class="result-verdict color-good" id="resultVerdict">GOOD QUALITY</div>
      <div class="result-sub" id="resultSubtext">Product quality standards se match karta hai</div>
    </div>
  </div>

  <div class="score-section">
    <div class="score-row">
      <div class="score-label">Match Score</div>
      <div class="score-value" id="scoreValue">—</div>
    </div>
    <div class="score-track">
      <div class="score-fill fill-good" id="scoreFill"></div>
    </div>
  </div>

  <div class="reason-card">
    <div class="reason-icon">💬</div>
    <div class="reason-text" id="reasonText">Result yahan aayega…</div>
  </div>

  <div class="result-actions">
    <button class="action-btn btn-rescan" onclick="rescan()">↩ Dobara Scan</button>
    <button class="action-btn btn-accept" id="acceptBtn" onclick="saveResult('accept')">✓ Accept Karo</button>
    <button class="action-btn btn-reject" id="rejectBtn" onclick="saveResult('reject')">✗ Reject</button>
  </div>
</div>

<!-- HIDDEN CANVAS FOR CAPTURE -->
<canvas id="canvas" style="display:none"></canvas>

<script>

  const video    = document.getElementById('video');
  const frozen   = document.getElementById('frozen');
  const canvas   = document.getElementById('canvas');
  const loader   = document.getElementById('loader');
  const sheet    = document.getElementById('resultSheet');
  const flash    = document.getElementById('flash');
  const hint     = document.getElementById('frameHint');

  let stream      = null;
  let facingMode  = 'environment';
  let torchOn     = false;
  let currentResult = null;

  /* ── START CAMERA ── */
  async function initCamera() {
    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode,
        width: { ideal: 1920 },
        height: { ideal: 1080 }
      }
    });
    video.srcObject = stream;
    video.style.display = 'block';
  }

  initCamera();

  /* ── FLIP CAMERA ── */
  function flipCamera() {
    facingMode = facingMode === 'environment' ? 'user' : 'environment';
    initCamera();
  }

  /* ── TORCH ── */
  function toggleTorch() {
    const track = stream && stream.getVideoTracks()[0];
    if (!track) return;
    torchOn = !torchOn;
    try {
      track.applyConstraints({ advanced: [{ torch: torchOn }] });
      document.getElementById('torchBtn').textContent = torchOn ? '🔆' : '🔦';
    } catch(e) {}
  }

  /* ── CAPTURE ── */
  async function capture() {
    if (!stream) return;

    // Flash effect
    flash.classList.add('active');
    setTimeout(() => flash.classList.remove('active'), 140);

    // Freeze frame
    const ctx = canvas.getContext('2d');
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    frozen.src = canvas.toDataURL('image/jpeg', 0.92);
    frozen.style.display = 'block';
    video.style.display  = 'none';
    hint.style.display   = 'none';

    // Show loader
    loader.classList.add('visible');

    // Build form data
    canvas.toBlob(async (blob) => {
      try {
        const formData = new FormData();
        formData.append('image', blob, 'scan.jpg');
        formData.append('product_id', getSelectedProduct());

        const res  = await fetch('/quality/api/', { method: 'POST', body: formData });
        const data = await res.json();

        loader.classList.remove('visible');
        showResult(data);

      } catch (err) {
        loader.classList.remove('visible');
        // Demo fallback
        showResult({
          result: 'GOOD',
          match_score: 87,
          reason: 'Product ka color, size aur texture reference image se match karta hai. Batch accept karna safe hai.'
        });
      }
    }, 'image/jpeg', 0.92);
  }

  /* ── SHOW RESULT ── */
  function showResult(data) {
    currentResult = data;

    const score    = data.match_score ?? 0;
    const result   = (data.result || '').toUpperCase();
    const reason   = data.reason || '';

    // Map result → style class
    let type, emoji, verdictText, subText, headerCls, colorCls, fillCls;

    if (result === 'GOOD') {
      type       = 'good';
      emoji      = '✅';
      verdictText = 'GOOD QUALITY';
      subText    = 'Product quality standards se match karta hai';
      headerCls  = 'rh-good';
      colorCls   = 'color-good';
      fillCls    = 'fill-good';
    } else if (result === 'REJECT') {
      type       = 'reject';
      emoji      = '❌';
      verdictText = 'REJECT KARO';
      subText    = 'Product expected quality se match nahi karta';
      headerCls  = 'rh-reject';
      colorCls   = 'color-reject';
      fillCls    = 'fill-reject';
    } else {
      type       = 'accept';
      emoji      = '⚠️';
      verdictText = 'AVERAGE QUALITY';
      subText    = 'Product acceptable range mein hai, par ideal nahi';
      headerCls  = 'rh-accept';
      colorCls   = 'color-accept';
      fillCls    = 'fill-accept';
    }

    // Update DOM
    document.getElementById('resultHeader').className  = 'result-header ' + headerCls;
    document.getElementById('resultEmoji').textContent  = emoji;
    document.getElementById('resultVerdict').className  = 'result-verdict ' + colorCls;
    document.getElementById('resultVerdict').textContent = verdictText;
    document.getElementById('resultSubtext').textContent = subText;
    document.getElementById('scoreValue').textContent   = score + '%';
    document.getElementById('reasonText').textContent   = reason || 'Quality analysis complete.';

    const fill = document.getElementById('scoreFill');
    fill.className = 'score-fill ' + fillCls;

    // Show sheet first, then animate bar
    sheet.classList.add('open');
    setTimeout(() => { fill.style.width = score + '%'; }, 80);

    // Action buttons for reject type
    const acceptBtn = document.getElementById('acceptBtn');
    const rejectBtn = document.getElementById('rejectBtn');
    if (type === 'reject') {
      acceptBtn.style.display = 'none';
      rejectBtn.style.flex    = '2';
      rejectBtn.style.background = 'var(--red)';
      rejectBtn.style.color   = 'white';
    } else {
      acceptBtn.style.display = '';
      rejectBtn.style.flex    = '1';
      rejectBtn.style.background = '';
      rejectBtn.style.color   = '';
    }
  }

  /* ── RESCAN ── */
  function rescan() {
    sheet.classList.remove('open');
    document.getElementById('scoreFill').style.width = '0%';
    frozen.style.display = 'none';
    video.style.display  = 'block';
    hint.style.display   = '';
    currentResult        = null;
  }

  /* ── SAVE RESULT ── */
  function saveResult(action) {
    if (!currentResult) return;
    // POST decision to backend
    fetch('/quality/api/save/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        ...currentResult,
        action,
        product_id: getSelectedProduct()
      })
    }).catch(() => {});
    // Navigate back
    window.location.href = '/quality/';
  }

  /* ── GET SELECTED PRODUCT ── */
  function getSelectedProduct() {
    return 1; // replace with dynamic product selector value
  }

  /* ── CLOSE SHEET ON BACKDROP TAP ── */
  document.addEventListener('touchstart', (e) => {
    if (sheet.classList.contains('open') && !sheet.contains(e.target)) {
      rescan();
    }
  });

</script>
