<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Purchase Add Karo — Qualify</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Noto+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--saffron:#E8622A;--turmeric:#F2A93B;--cream:#FAF6F0;--cream-dark:#F0E9DF;--indigo:#1A1A2E;--text:#1C1C1C;--text-muted:#7A7A7A;--white:#FFFFFF;--green:#2A9D5C;--radius:18px}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:'Noto Sans',sans-serif;background:var(--cream);color:var(--text);max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:32px}

  .pattern-strip{height:4px;background:repeating-linear-gradient(90deg,var(--saffron) 0,var(--saffron) 8px,var(--turmeric) 8px,var(--turmeric) 16px,#fff 16px,#fff 20px,var(--indigo) 20px,var(--indigo) 28px,#fff 28px,#fff 32px);opacity:.65}

  .header{padding:14px 20px;background:var(--white);display:flex;align-items:center;gap:12px;box-shadow:0 1px 0 rgba(0,0,0,.06)}
  .back-btn{width:34px;height:34px;border-radius:50%;background:var(--cream);border:1.5px solid rgba(0,0,0,.08);display:flex;align-items:center;justify-content:center;text-decoration:none;color:var(--text);font-size:15px;flex-shrink:0;transition:all .15s}
  .back-btn:active{background:var(--cream-dark);transform:scale(.93)}
  .header-info{flex:1}
  .page-title{font-family:'Sora',sans-serif;font-size:16px;font-weight:800;color:var(--text);letter-spacing:-.4px}
  .page-sub{font-size:11.5px;color:var(--text-muted);margin-top:1px}

  .hero-area{padding:20px 24px 16px;animation:fadeUp .45s ease both}
  .hero-area h1{font-family:'Sora',sans-serif;font-size:26px;font-weight:800;letter-spacing:-.8px;color:var(--indigo);line-height:1.2}
  .hero-area h1 span{color:var(--saffron)}

  .form-card{margin:0 16px;background:var(--white);border-radius:var(--radius);padding:22px;box-shadow:0 2px 16px rgba(0,0,0,.06);border:1px solid rgba(0,0,0,.04);animation:fadeUp .4s .08s ease both}

  .field{margin-bottom:16px}
  .field label{display:block;font-family:'Sora',sans-serif;font-size:11.5px;font-weight:700;color:var(--text-muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:7px}
  .input-wrap{position:relative}
  .input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:15px;opacity:.4;pointer-events:none}
  .field input,.field select{width:100%;padding:13px 14px 13px 42px;border:1.5px solid rgba(0,0,0,.1);border-radius:12px;font-family:'Noto Sans',sans-serif;font-size:15px;color:var(--text);background:var(--cream);outline:none;-webkit-appearance:none;appearance:none;transition:border-color .18s,background .18s}
  .field input:focus,.field select:focus{border-color:var(--saffron);background:var(--white);box-shadow:0 0 0 3px rgba(232,98,42,.08)}
  .field input::placeholder{color:#C0BAB2}
  .field select{cursor:pointer}

  /* quality stars */
  .quality-stars{display:flex;gap:8px;margin-top:8px}
  .star-btn{width:40px;height:40px;border-radius:10px;border:1.5px solid rgba(0,0,0,.1);background:var(--cream);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .18s}
  .star-btn.selected{background:rgba(242,169,59,.15);border-color:var(--turmeric)}
  .star-btn:active{transform:scale(.93)}

  /* live calc */
  .live-calc{margin-top:10px;padding:12px 14px;background:rgba(232,98,42,.06);border-radius:10px;font-family:'Sora',sans-serif;font-size:13px;font-weight:600;color:var(--saffron);display:flex;justify-content:space-between;align-items:center}
  .live-calc-amount{font-size:18px;font-weight:800;letter-spacing:-.5px}

  .btn-submit{width:100%;font-family:'Sora',sans-serif;font-size:15px;font-weight:700;color:white;background:var(--saffron);border:none;padding:15px;border-radius:14px;cursor:pointer;letter-spacing:-.2px;box-shadow:0 6px 20px rgba(232,98,42,.28);transition:all .18s;margin-top:8px}
  .btn-submit:active{transform:scale(.975);opacity:.88}

  .select-arrow{position:absolute;right:14px;top:50%;transform:translateY(-50%);pointer-events:none;opacity:.4;font-size:12px}

  @keyframes fadeUp{from{opacity:0;transform:translateY(13px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="pattern-strip"></div>

<div class="header">
  <a href="/sourcing/{{supplier.id}}/" class="back-btn">←</a>
  <div class="header-info">
    <div class="page-title">Purchase Add Karo</div>
    <div class="page-sub">{{supplier.name}}</div>
  </div>
</div>

<div class="hero-area">
  <h1>Nayi <span>kharidi</span><br>record karo</h1>
</div>

<div class="form-card">
  <form method="POST" action="/sourcing/{{supplier.id}}/add/">
    {% csrf_token %}

    <div class="field">
      <label>Product</label>
      <div class="input-wrap">
        <span class="input-icon">🥦</span>
        <select name="product">
          {% for p in products %}
          <option value="{{p.id}}">{{p.name}}</option>
          {% endfor %}
        </select>
        <span class="select-arrow">▼</span>
      </div>
    </div>

    <div class="field">
      <label>Quantity</label>
      <div class="input-wrap">
        <span class="input-icon">⚖️</span>
        <input name="quantity" type="number" placeholder="e.g. 50 (kg / pieces)" id="qty" oninput="calcTotal()" inputmode="numeric">
      </div>
    </div>

    <div class="field">
      <label>Price per Unit (₹)</label>
      <div class="input-wrap">
        <span class="input-icon">₹</span>
        <input name="price" type="number" placeholder="e.g. 25" id="price" oninput="calcTotal()" inputmode="decimal">
      </div>
      <div class="live-calc" id="total-calc" style="display:none">
        <span>Total Amount</span>
        <span class="live-calc-amount" id="total-display">₹0</span>
      </div>
    </div>

    <div class="field">
      <label>Quality Score</label>
      <input type="hidden" name="quality" id="quality-hidden" value="0">
      <div class="quality-stars" id="stars">
        <div class="star-btn" onclick="setScore(1)">1⭐</div>
        <div class="star-btn" onclick="setScore(2)">2⭐</div>
        <div class="star-btn" onclick="setScore(3)">3⭐</div>
        <div class="star-btn" onclick="setScore(4)">4⭐</div>
        <div class="star-btn" onclick="setScore(5)">5⭐</div>
      </div>
    </div>

    <button type="submit" class="btn-submit">Purchase Save Karo →</button>
  </form>
</div>

<script>
  function calcTotal() {
    const q = parseFloat(document.getElementById('qty').value) || 0;
    const p = parseFloat(document.getElementById('price').value) || 0;
    const t = q * p;
    const calc = document.getElementById('total-calc');
    if (t > 0) {
      calc.style.display = 'flex';
      document.getElementById('total-display').textContent = '₹' + t.toFixed(2);
    } else {
      calc.style.display = 'none';
    }
  }

  function setScore(val) {
    document.getElementById('quality-hidden').value = val;
    document.querySelectorAll('.star-btn').forEach((b, i) => {
      b.classList.toggle('selected', i < val);
    });
  }
</script>

</body>
</html>
